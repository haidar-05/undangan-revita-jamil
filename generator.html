<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Generator Undangan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
      body {
        background: #f8f9fa;
        font-family: sans-serif;
      }

      .card {
        max-width: 500px;
        margin: 80px auto;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <div class="card text-center">
      <h3>Generator Link Undangan 💌</h3>

      <input type="text" id="nama" class="form-control mt-3" placeholder="Masukkan nama tamu" />

      <button onclick="generate()" class="btn btn-primary mt-3">Generate</button>

      <div id="result" class="mt-4"></div>
    </div>

    <script>
      function generate() {
        let nama = document.getElementById("nama").value.trim();

        if (!nama) {
          alert("Isi nama dulu bro 😄");
          return;
        }

        // Encode nama biar aman (spasi & simbol)
        let encoded = encodeURIComponent(nama);

        let link = "https://haidar-05.github.io/undangan-revita-jamil/?to=" + encoded;

        // Format pesan lengkap (SESUAI REQUEST LU 🔥)
        let pesan = `Yth. ${nama}

Assalamualaikum Wr. Wb

Dengan memohon Rahmat dan Ridho Allah SWT, tanpa mengurangi rasa hormat kami mengundang Bapak/Ibu/Saudara/i untuk berkenan hadir di acara pernikahan kami.

Detail Acara:
${link}

Merupakan suatu kehormatan dan kebahagiaan jika Anda bersedia hadir dan turut memberikan doa restu untuk kami.

Terima kasih kami sampaikan.

Wassalamualaikum Wr. Wb

Revita & Jamil`;

        let wa = "https://wa.me/?text=" + encodeURIComponent(pesan);

        document.getElementById("result").innerHTML = `
          <p><b>Link:</b></p>
          <input value="${link}" id="copyText" class="form-control text-center" readonly>

          <button onclick="copyLink()" class="btn btn-warning mt-2">Copy Link</button>

          <br><br>

          <a href="${link}" target="_blank" class="btn btn-success">Buka Undangan</a>
          <br><br>

          <a href="${wa}" target="_blank" class="btn btn-success">Kirim WhatsApp</a>
        `;
      }

      function copyLink() {
        let copyText = document.getElementById("copyText");
        copyText.select();
        document.execCommand("copy");
        alert("Link berhasil dicopy!");
      }
    </script>
  </body>
</html>
